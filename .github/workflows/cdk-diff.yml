name: CDK Diff

on:
  pull_request:
    paths:
      - 'cdk/**'

# Cancel an in-flight diff if a new commit lands on the same PR — only the
# latest diff is useful as a review aid, and runs against a stale commit just
# waste runner minutes.
concurrency:
  group: cdk-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  cdk-diff:
    name: Show CDK Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Read-only role: PR workflows execute arbitrary TypeScript from the PR
      # branch via `npx cdk diff`, so they must never hold deploy-grade creds.
      # NOTE: Wiki7GitHubActionsDiffRole is created by the GitHubOidcStack — the
      # first PR after that stack change merges will fail this step until a
      # master deploy has run once.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::368127906643:role/Wiki7GitHubActionsDiffRole
          aws-region: il-central-1

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: cd cdk && npm ci

      - name: CDK Diff
        id: diff
        run: |
          set +e
          # `cdk diff` exits non-zero when a diff exists (the documented behavior).
          # Capture stdout+stderr regardless; surface the exit code as an output.
          cd cdk
          diff_output=$(npx cdk diff --all 2>&1)
          diff_exit=$?
          {
            echo 'diff<<DIFF_EOF'
            echo "$diff_output"
            echo 'DIFF_EOF'
            echo "exit_code=$diff_exit"
          } >> "$GITHUB_OUTPUT"
          # Mirror to the action log so reviewers can still read it in the UI.
          echo "$diff_output"
          exit 0

      - name: Post diff as sticky PR comment
        # Third-party action holding a pull-requests:write token — pinned to a
        # commit SHA so a moving tag can't ship different code into this workflow.
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: cdk-diff
          message: |
            ## CDK Diff

            <details>
            <summary>Output of <code>npx cdk diff --all</code> (click to expand)</summary>

            ```
            ${{ steps.diff.outputs.diff }}
            ```

            </details>
