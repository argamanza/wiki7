name: Lint and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Per-ref de-dup: when a branch gets two pushes in quick succession the second
# one cancels the first. Saves runner minutes; safe because lint+test are
# read-only and have no live-system side effects.
concurrency:
  group: lint-and-test-${{ github.ref }}
  cancel-in-progress: true

# Lint + test only read the repo; never grant the default (potentially write) token.
permissions:
  contents: read

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup PHP
        # Third-party action — pinned to a commit SHA so a moving tag can't ship
        # different code into a workflow run.
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Install PHP CodeSniffer
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require mediawiki/mediawiki-codesniffer
      - name: Run PHP lint
        # Advisory until Phase 3 enforces it across the rewritten skin diff.
        # Findings show up in the UI as a failed step ⚠️ but don't block the workflow.
        continue-on-error: true
        run: |
          cd docker/skins/Wiki7
          ~/.composer/vendor/bin/phpcs --standard=MediaWiki includes/

  lint-js:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install ESLint
        run: npm install -g eslint eslint-config-wikimedia
      - name: Run ESLint
        # Advisory until Phase 3 enforces it. Removed the `|| true` shell guard so
        # the step's actual exit status surfaces in the UI; continue-on-error keeps
        # the workflow green.
        continue-on-error: true
        run: |
          cd docker/skins/Wiki7
          npx eslint resources/

  test-cdk:
    name: CDK Tests
    # On master pushes deploy.yml runs the exact same suite as its deploy gate —
    # running it here too is a duplicate. PRs are where this job earns its keep.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - name: Install dependencies
        run: cd cdk && npm ci
      - name: Run CDK tests
        run: cd cdk && npm test

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        # Pre-built binary install (no `pip install uv`) — faster + avoids a Python ↔ uv
        # bootstrap cycle on the runner. Caches uv's own download for the runner.
        # Third-party action — pinned to a commit SHA (see setup-php note above).
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
      - name: Install dependencies
        run: cd data && uv sync
      - name: Run linter
        # Advisory until the Phase 3 pipeline correctness work lands (which touches
        # the 7 ruff issues that overlap the broken transfers spider).
        continue-on-error: true
        run: cd data && uv run ruff check .
      - name: Run tests
        run: cd data && uv run pytest --tb=short -v
      - name: Run pipeline dry-run
        run: |
          cd data
          mkdir -p data_pipeline/output/2024 tmk-scraper/output/2024
          cp tests/fixtures/matches_sample.json tmk-scraper/output/2024/matches.json
          uv run python -c "
          from data_pipeline.normalize_enrich_players import main
          main(raw_path='tests/fixtures/players_sample.json', stats_path='tests/fixtures/stats_sample.json', out_dir='data_pipeline/output/2024')
          "
          uv run python run_pipeline.py --skip-scrape --skip-normalize --dry-run -v
