name: Deploy to AWS

on:
  push:
    branches: [master]
    # Docs-only commits don't change the image or the infra — skip the ~15 min
    # qemu ARM64 build + cdk deploy. (paths-ignore skips the run only when ALL
    # changed files match, so mixed code+docs pushes still deploy.)
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

# A failed deploy that's already in flight should finish (rolling it back from
# half-applied CFN state mid-execution causes worse problems than waiting). Queue
# follow-up pushes; never run two deploys against the same branch concurrently.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# id-token: write is granted per-job below — only `deploy` needs to mint OIDC
# tokens; the test job shouldn't hold that capability.
permissions:
  contents: read

jobs:
  test:
    name: CDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json
      - name: Install dependencies
        run: cd cdk && npm ci
      - name: Run CDK tests
        run: cd cdk && npm test

  deploy:
    name: Deploy Infrastructure & Application
    runs-on: ubuntu-latest
    environment: production
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::368127906643:role/Wiki7GitHubActionsDeployRole
          aws-region: il-central-1

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      # Required for CDK DockerImageAsset to build the ARM64 MediaWiki image
      # on an x86 GitHub runner. Sets up qemu user-mode emulation + buildx.
      # On native ARM runners these are no-ops.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Install CDK dependencies
        run: cd cdk && npm ci

      - name: CDK Deploy
        id: cdk-deploy
        run: |
          cd cdk && npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json
          # Surface the live infra IDs to subsequent steps + the job summary.
          # Match output keys by prefix — CDK appends a hash suffix (e.g.
          # CloudFrontDistributionIdBFB1951A) that silently changes if a construct
          # path is ever renamed; hardcoding the hash broke the summary once.
          out() { jq -r --arg p "$1" '.Wiki7CdkStack | to_entries[] | select(.key | startswith($p)) | .value' cdk-outputs.json | head -1; }
          DIST_ID=$(out CloudFrontDistributionId)
          DIST_DOMAIN=$(out CloudFrontDistributionDomainName)
          EIP=$(out ComputeElasticIp)
          INSTANCE=$(out ComputeInstanceId)
          {
            echo "dist_id=$DIST_ID"
            echo "dist_domain=$DIST_DOMAIN"
            echo "eip=$EIP"
            echo "instance=$INSTANCE"
          } >> "$GITHUB_OUTPUT"

      # docker/assets/ is already shipped to the bucket via the CDK BucketDeployment
      # construct in compute-stack.ts — no separate `aws s3 sync` needed here.

      - name: Post-deploy health check
        id: healthcheck
        run: |
          # The EC2 image hash is baked into UserData; when CDK replaces the instance,
          # MediaWiki needs ~2-4 min before it answers. Poll BOTH endpoints because they
          # exercise different code paths:
          #   • /api.php — verifies MW itself + DB + opcache are alive
          #   • /         — verifies article rendering, which is where extension hooks
          #                 fire (OutputPageParserOutput, ParserOutput, etc.)
          # The 2026-06-06 incident slipped through because an extension was 500'ing
          # the homepage while /api.php kept returning 200; both checks must pass to
          # declare the deploy healthy.
          # The homepage probe carries a per-deploy cache-buster query param: the
          # Wiki7DynamicHtml CloudFront policy caches anon HTML (QS is in the cache
          # key), so a bare "/" can serve a stale edge-cached 200 and false-pass a
          # deploy that actually broke the origin.
          set -e
          for i in $(seq 1 12); do
            api=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://wiki7.co.il/api.php?action=query&meta=siteinfo&format=json" || echo 000)
            home=$(curl -s -o /dev/null -w '%{http_code}' "https://wiki7.co.il/?healthcheck=$GITHUB_SHA" || echo 000)
            if [ "$api" = "200" ] && [ "$home" = "200" ]; then
              echo "OK — wiki healthy on attempt $i (api=$api home=$home)"
              exit 0
            fi
            echo "Attempt $i — api=$api home=$home, retrying in 30s..."
            sleep 30
          done
          echo "FAIL — wiki did not return 200 on both endpoints within 6 minutes (last: api=$api home=$home)"
          exit 1

      - name: Dump recent EC2 console output on health-check failure
        if: failure() && steps.healthcheck.conclusion == 'failure'
        run: |
          # CDK reported success but the wiki isn't responding. Most common cause is
          # the UserData script failing partway through (Docker pull retry exhausted,
          # secret fetch error, etc.). Pull the SSM-shipped cloud-init log so the
          # failed run has the answer in its own logs instead of needing a manual
          # `aws logs tail` invocation.
          set +e
          INSTANCE_ID="${{ steps.cdk-deploy.outputs.instance }}"
          if [ -z "$INSTANCE_ID" ]; then
            echo "(no instance id available — cdk-deploy probably failed earlier)"
            exit 0
          fi
          echo "::group::EC2 console output (last 64 KB) for $INSTANCE_ID"
          aws ec2 get-console-output --instance-id "$INSTANCE_ID" --output text --query Output | tail -200 || true
          echo "::endgroup::"

      - name: Deployment summary
        if: always()
        env:
          INSTANCE: ${{ steps.cdk-deploy.outputs.instance || 'n/a (deploy failed)' }}
          EIP: ${{ steps.cdk-deploy.outputs.eip || 'n/a (deploy failed)' }}
          DIST_ID: ${{ steps.cdk-deploy.outputs.dist_id || 'n/a (deploy failed)' }}
          DIST_DOMAIN: ${{ steps.cdk-deploy.outputs.dist_domain || 'n/a (deploy failed)' }}
          # env indirection, not inline ${{ }} interpolation in the script body:
          # ref_name is attacker-influenced text (branch names) and inlining it
          # into `run:` is the canonical script-injection antipattern.
          BRANCH: ${{ github.ref_name }}
        run: |
          {
            echo "## Deployment ${{ job.status }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Site | https://wiki7.co.il |"
            echo "| Branch | \`$BRANCH\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Instance | \`$INSTANCE\` |"
            echo "| EIP | \`$EIP\` |"
            echo "| CloudFront | \`$DIST_ID\` ($DIST_DOMAIN) |"
          } >> "$GITHUB_STEP_SUMMARY"
